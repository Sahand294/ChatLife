{% extends "home.html" %}
{% load static %}
{% block title %}Conversations — ChatLife{% endblock %}
  {% block css %}
  <link rel="stylesheet" href="{% static "css/styles.css" %}" />
    {% endblock %}

{% block content %}
<main class="conv-wrap">
  <div class="conv-header">
    <div>
      <h1>Conversations</h1>
      <p id="conv-status">Pick up where you left off.</p>
    </div>
    <label class="conv-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
      <input id="conv-search-input" type="text" placeholder="Search conversations…" autocomplete="off" />
    </label>
  </div>

  <div class="conv-layout" id="conv-layout">
    <aside class="conv-list">
      <div class="conv-list-head">
        <h3>All chats</h3>
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="count" id="conv-count">0</span>
          <button type="button" id="new-chat-btn" class="new-chat-btn" aria-label="New chat" title="New chat">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
          </button>
        </div>
      </div>
      <div id="conv-list-body"></div>
    </aside>

    <section class="conv-thread" id="conv-thread"></section>
  </div>
</main>

<div class="modal" id="new-chat-modal" hidden>
  <div class="modal-card">
    <div class="modal-head">
      <h2>New chat</h2>
      <button type="button" class="icon-btn" id="new-chat-close" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <form class="modal-form" id="new-chat-form">
      <label>Name
        <div class="suggest-wrap">
          <input id="new-chat-name" name="name" type="text" required placeholder="Search people…" autocomplete="off" />
          <div class="suggest-list" id="suggest-list" hidden></div>
        </div>
      </label>
      <label>First message <span style="color:var(--muted);font-weight:400;">(optional)</span><textarea name="message" rows="3" placeholder="Say hi 👋"></textarea></label>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:4px;">
        <button type="button" class="btn" id="new-chat-cancel">Cancel</button>
        <button type="submit" class="btn btn-primary">Start chat</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
{% block js %}
<script src="{% static "js/conversations.js" %}"></script>
{% endblock %}
